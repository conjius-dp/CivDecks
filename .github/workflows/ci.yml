name: CI

on:
  push:
    branches: [main]

env:
  GODOT_VERSION: "4.6.1"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-test-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: /usr/local/bin/godot
          key: godot-linux-${{ env.GODOT_VERSION }}
      - name: setup
        run: |
          if [ ! -f /usr/local/bin/godot ]; then
            wget -q https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip
            unzip -q Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip
            mv Godot_v${GODOT_VERSION}-stable_linux.x86_64 /usr/local/bin/godot
            chmod +x /usr/local/bin/godot
          fi
          godot --headless --editor --quit 2>&1 || true
        timeout-minutes: 2
      - name: test
        run: godot --headless --script tests/test_runner.gd 2>&1
        timeout-minutes: 2
      - name: lint
        run: pip install -q gdtoolkit && gdlint scripts/**/*.gd resources/**/*.gd

  exportmacos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/cache@v4
        with:
          path: /usr/local/bin/godot
          key: godot-linux-${{ env.GODOT_VERSION }}
      - uses: actions/cache@v4
        id: templates-cache
        with:
          path: ~/.local/share/godot/export_templates
          key: export-templates-${{ env.GODOT_VERSION }}
      - name: setup
        run: |
          if [ ! -f /usr/local/bin/godot ]; then
            wget -q https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip
            unzip -q Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip
            mv Godot_v${GODOT_VERSION}-stable_linux.x86_64 /usr/local/bin/godot
            chmod +x /usr/local/bin/godot
          fi
          if [ ! -d ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable ]; then
            mkdir -p ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable
            wget -q https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz
            unzip -q Godot_v${GODOT_VERSION}-stable_export_templates.tpz
            mv templates/* ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable/
          fi
      - name: export
        run: |
          godot --headless --editor --quit 2>&1 || true
          cat > export_presets.cfg << 'PRESETS'
          [preset.0]
          name="macOS"
          platform="macOS"
          runnable=true
          dedicated_server=false
          custom_features=""
          export_filter="all_resources"
          include_filter=""
          exclude_filter=""
          export_path="build/civ-deckbuilder.zip"
          [preset.0.options]
          application/product_name="civ-deckbuilder"
          application/bundle_identifier="com.civ-deckbuilder.game"
          PRESETS
          mkdir -p build
          godot --headless --export-release "macOS" build/civ-deckbuilder.zip 2>&1
        timeout-minutes: 3
      - name: version
        id: version
        run: |
          PATCH=$(git rev-list --count HEAD)
          IS_STABLE=${{ contains(github.event.head_commit.message, '#stable-release') }}
          if [ "$IS_STABLE" = "true" ]; then
            echo "tag=v0.1.${PATCH}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=v0.1.${PATCH}-nightly" >> "$GITHUB_OUTPUT"
          fi
      - name: upload
        uses: actions/upload-artifact@v4
        with:
          name: civ-deckbuilder-${{ steps.version.outputs.tag }}-macOS
          path: build/civ-deckbuilder.zip

  publish:
    needs: build-test-lint
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      is_stable: ${{ steps.version.outputs.is_stable }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: tag
        id: version
        run: |
          PATCH=$(git rev-list --count HEAD)
          IS_STABLE=${{ contains(github.event.head_commit.message, '#stable-release') }}
          if [ "$IS_STABLE" = "true" ]; then
            TAG="v0.1.${PATCH}"
          else
            TAG="v0.1.${PATCH}-nightly"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "is_stable=$IS_STABLE" >> "$GITHUB_OUTPUT"
          git tag "$TAG"
          git push origin "$TAG"
          if [ "$IS_STABLE" = "true" ]; then
            git tag -f stable
            git push origin stable --force
          fi

  release:
    needs: [publish, exportmacos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: download
        uses: actions/download-artifact@v4
        with:
          name: civ-deckbuilder-${{ needs.publish.outputs.tag }}-macOS
          path: build
      - name: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.publish.outputs.tag }}"
          IS_STABLE="${{ needs.publish.outputs.is_stable }}"
          mv build/civ-deckbuilder.zip "build/civ-deckbuilder-${TAG}-macOS.zip"
          if [ "$IS_STABLE" = "true" ]; then
            gh release create "$TAG" "build/civ-deckbuilder-${TAG}-macOS.zip" \
              --title "$TAG" \
              --notes "Automated build from commit ${{ github.sha }}" \
              --latest
          else
            gh release create "$TAG" "build/civ-deckbuilder-${TAG}-macOS.zip" \
              --title "$TAG" \
              --notes "Automated build from commit ${{ github.sha }}" \
              --prerelease
          fi

  screenshots:
    needs: release
    if: contains(github.event.head_commit.message, '#stable-release')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: /usr/local/bin/godot
          key: godot-linux-${{ env.GODOT_VERSION }}
      - name: setup
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq xvfb
          if [ ! -f /usr/local/bin/godot ]; then
            wget -q https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip
            unzip -q Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip
            mv Godot_v${GODOT_VERSION}-stable_linux.x86_64 /usr/local/bin/godot
            chmod +x /usr/local/bin/godot
          fi
      - name: import
        run: xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" godot --editor --quit 2>&1 || true
      - name: capture
        run: |
          echo -e '\n[autoload]\nScreenshotCapture="*res://scripts/tools/screenshot_capture.gd"' >> project.godot
          mkdir -p screenshots
          timeout 60 xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" godot --path . 2>&1 || true
          cp ~/.local/share/godot/app_userdata/civ-deckbuilder/screenshots/*.png screenshots/ 2>/dev/null || true
          ls -la screenshots/
        timeout-minutes: 2
      - name: upload
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(gh release list --limit 1 --json tagName --jq '.[0].tagName')
          FILES=""
          for f in screenshots/screenshot-*.png; do
            [ -f "$f" ] && FILES="$FILES $f"
          done
          if [ -n "$FILES" ]; then
            gh release upload "$TAG" $FILES --clobber
          fi
          if ls screenshots/screenshot-*.png 1>/dev/null 2>&1; then
            git config user.name "github-actions"
            git config user.email "github-actions@github.com"
            git checkout --orphan gh-pages-tmp
            git rm -rf . 2>/dev/null || true
            cp screenshots/screenshot-*.png .
            cat > index.html << 'HTMLEOF'
<!DOCTYPE html><html><head><meta charset="utf-8"><title>civ-deckbuilder</title>
<style>
*{box-sizing:border-box}
body{background:#1a1a2e;color:#e0e0e0;font-family:system-ui;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 20px;margin:0}
h1{margin-bottom:8px}
.desc{color:#888;margin-bottom:32px}
a{color:#6ea8fe;text-decoration:none}
.shots{display:flex;gap:24px;justify-content:center;align-items:center;max-width:1400px}
.shots img{width:660px;border-radius:8px;border:1px solid #333;cursor:pointer;transition:transform .2s}
.shots img:hover{transform:scale(1.02)}
.links{display:flex;gap:32px;margin-top:36px}
.links a{display:flex;align-items:center;gap:8px;color:#ccc;font-size:15px;transition:color .2s}
.links a:hover{color:#fff}
.links svg{width:20px;height:20px;fill:currentColor}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);justify-content:center;align-items:center;cursor:pointer;z-index:10}
.modal.open{display:flex}
.modal img{max-width:95%;max-height:95%;border-radius:8px}
</style></head><body>
<h1>civ-deckbuilder</h1>
<p class="desc">Hex-based civilization strategy game with deckbuilding mechanics</p>
<div class="shots">
<img src="screenshot-main.png" alt="Gameplay" onclick="openModal(this.src)">
<img src="screenshot-gallery.png" alt="Gallery" onclick="openModal(this.src)">
</div>
<div class="links">
<a href="https://github.com/conjius/civ-deckbuilder"><svg viewBox="0 0 16 16"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>Source</a>
<a href="https://github.com/conjius/civ-deckbuilder/releases/latest"><svg viewBox="0 0 16 16"><path d="M2.75 14A1.75 1.75 0 011 12.25v-8.5C1 2.784 1.784 2 2.75 2h5.5a.75.75 0 010 1.5h-5.5a.25.25 0 00-.25.25v8.5c0 .138.112.25.25.25h8.5a.25.25 0 00.25-.25v-3.5a.75.75 0 011.5 0v3.5A1.75 1.75 0 0111.25 14h-8.5z"/><path d="M9.768 1.768a.75.75 0 011.06 0l3.404 3.404a.75.75 0 01-1.06 1.06L9.768 2.828a.75.75 0 010-1.06z"/><path d="M14.5 1.75a.75.75 0 00-.75-.75h-3.5a.75.75 0 000 1.5h3.5a.75.75 0 00.75-.75z"/><path d="M13.25 1a.75.75 0 01.75.75v3.5a.75.75 0 01-1.5 0v-3.5a.75.75 0 01.75-.75z"/></svg>Download</a>
</div>
<div class="modal" id="modal" onclick="closeModal()"><img id="modalImg" src=""></div>
<script>
function openModal(src){document.getElementById('modalImg').src=src;document.getElementById('modal').classList.add('open')}
function closeModal(){document.getElementById('modal').classList.remove('open')}
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal()})
</script>
</body></html>
HTMLEOF
            git add screenshot-*.png index.html
            git commit -m "Update screenshots and landing page"
            git push origin gh-pages-tmp:gh-pages --force
          fi
